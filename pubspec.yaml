name: concert_management_app
description: "Concert backstage operations management app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.71.0
  intl: ^0.20.2
  percent_indicator: ^4.2.5
  uuid: ^4.5.1
  share_plus: ^10.1.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  # Offline detection
  connectivity_plus: ^6.1.1
  # Local notifications
  flutter_local_notifications: ^18.0.1
  # PDF generation & sharing
  pdf: ^3.11.2
  printing: ^5.14.2
  # Runtime permissions
  permission_handler: ^11.4.0
  # Persisting sort/filter preferences
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#0A0A1A"
  image: assets/images/logo.png
  color_dark: "#0A0A1A"
  image_dark: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#0A0A1A"
    icon_background_color: "#0A0A1A"
  android: true
  ios: false
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
